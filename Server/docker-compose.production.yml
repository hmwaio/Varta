services:
  server:
    image: ${ECR_URI}/varta-server:latest
    container_name: varta-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.production

  nginx:
    image: nginx:alpine
    container_name: varta-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - server