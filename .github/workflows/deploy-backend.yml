name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "Server/**"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"

            cd /app/Varta

            git pull origin main

            cd Server

            npm ci --omit=dev

            npx prisma generate

            npm run build

            pm2 restart varta-server || pm2 start dist/index.js --name varta-server --env production
