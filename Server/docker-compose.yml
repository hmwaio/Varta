version: "3.9"

services:
  postgres:
    image: postgres:17
    container_name: varta-pg
    restart: unless-stopped
    environment:
      POSTGRES_USER: hmwaio
      POSTGRES_PASSWORD: Hmwaio123
      POSTGRES_DB: varta_pg_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # REDIS
  redis:
    image: redis:8
    container_name: varta-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # KAFKA
  kafka:
    image: apache/kafka:4.2.0
    container_name: varta-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

    volumes:
      - kafka_data:/var/lib/kafka/data

volumes:
  postgres_data:
    name: varta_backend_postgres_data
  redis_data:
    name: varta_backend_redis_data
  kafka_data:
    name: varta_backend_kafka_data
